<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biblioteca Visual, Portal do Educador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

html, body { margin: 0; padding: 0; background: transparent; overflow-x: hidden; }
html, body { height: auto; }
/* Modo standalone: app carregado direto (não em iframe), ocupa tela toda */
html.pde-standalone, html.pde-standalone body {
  height: 100%;
  margin: 0;
  background: #050912;
}
html.pde-standalone body {
  display: flex;
  align-items: stretch;
  justify-content: center;
  min-height: 100vh;
}
html.pde-standalone #pde-painel {
  height: 100vh !important;
  min-height: 100vh;
  width: 100%;
  max-width: 100%;
  border-radius: 0 !important;
  border: none !important;
  box-shadow: none !important;
}
/* Quando o app é carregado em modo lightbox (com ?lightbox=), libera viewport todo */
body.pde-lb-mode { height: 100%; overflow: hidden; background: #050912; }
body.pde-lb-mode #pde-painel { display: none !important; }

/* Lightbox quando movido pra fora do #pde-painel (modo standalone, em iframe-filho) */
.pde-lb-standalone {
  --bg-deep: #050912;
  --bg-base: #0A1220;
  --bg-elev: #0F1A2D;
  --surface: rgba(20,33,58,.55);
  --surface-hi: rgba(30,50,84,.7);
  --border: rgba(55,177,218,.18);
  --border-hi: rgba(55,177,218,.45);
  --cyan: #37B1DA;
  --cyan-hi: #5DCDF5;
  --cyan-glow: rgba(55,177,218,.35);
  --lime: #B6D752;
  --navy: #1E324A;
  --tx: #E8F1FB;
  --tx-mu: #8BA3BF;
  --tx-dim: #5A7290;
  --ft: 'Space Grotesk', system-ui, sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --tr: .25s cubic-bezier(.4,0,.2,1);
  font-family: var(--ft);
  color: var(--tx);
  display: flex !important;
  flex-direction: column;
  position: fixed !important;
  inset: 0 !important;
  background: #050912 !important;
  z-index: 1 !important;
}
.pde-lb-standalone * { box-sizing: border-box; margin: 0; padding: 0; }
.pde-lb-standalone .pde-lb-top {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,18,32,.8);
  z-index: 10;
}
.pde-lb-standalone .pde-lb-meta { flex: 1; min-width: 0; }
.pde-lb-standalone .pde-lb-name {
  font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pde-lb-standalone .pde-lb-cat {
  font-family: var(--fm); font-size: 9px; color: var(--lime);
  letter-spacing: .2em; text-transform: uppercase; margin-top: 2px;
}
.pde-lb-standalone .pde-lb-tools { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.pde-lb-standalone .pde-lb-tool {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--tx); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--tr);
}
.pde-lb-standalone .pde-lb-tool:hover {
  background: var(--surface-hi); border-color: var(--cyan); color: var(--cyan-hi);
}
.pde-lb-standalone .pde-lb-tool:disabled { opacity: .35; cursor: not-allowed; }
.pde-lb-standalone .pde-lb-tool svg { width: 16px; height: 16px; }
.pde-lb-standalone .pde-lb-zoom-display {
  font-family: var(--fm); font-size: 10px; color: var(--cyan);
  padding: 0 8px; min-width: 48px; text-align: center; font-weight: 600;
}
.pde-lb-standalone .pde-lb-divider { width: 1px; height: 22px; background: var(--border); margin: 0 3px; }
.pde-lb-standalone .pde-lb-stage {
  position: relative; flex: 1; min-height: 0; overflow: hidden;
  background: #000; cursor: grab;
  display: flex; align-items: center; justify-content: center;
}
.pde-lb-standalone .pde-lb-stage.panning { cursor: grabbing; }
.pde-lb-standalone .pde-lb-stage.zoomed { cursor: grab; }
.pde-lb-standalone .pde-lb-canvas-wrap {
  position: absolute; left: 50%; top: 50%;
  transform-origin: center center;
  transition: transform .25s cubic-bezier(.2,.8,.2,1);
  will-change: transform;
}
.pde-lb-standalone .pde-lb-canvas-wrap.no-trans { transition: none; }
.pde-lb-standalone .pde-lb-canvas { display: block; pointer-events: none; }
.pde-lb-standalone .pde-lb-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--tx-mu); z-index: 5;
}
.pde-lb-standalone .pde-loading-spin {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(55,177,218,.15); border-top-color: var(--cyan);
  animation: pde-spin .8s linear infinite;
}
.pde-lb-standalone .pde-lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 8;
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(5,9,18,.75); border: 1px solid var(--border);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--tr);
}
.pde-lb-standalone .pde-lb-nav:hover {
  background: rgba(55,177,218,.3); border-color: var(--cyan);
}
.pde-lb-standalone .pde-lb-nav.prev { left: 20px; }
.pde-lb-standalone .pde-lb-nav.next { right: 20px; }
.pde-lb-standalone .pde-lb-nav svg { width: 22px; height: 22px; }
.pde-lb-standalone .pde-lb-nav:disabled { opacity: .25; cursor: not-allowed; }
.pde-lb-standalone img {
  -webkit-user-drag: none; -webkit-touch-callout: none; pointer-events: none;
}

#pde-painel {
  --bg-deep: #050912;
  --bg-base: #0A1220;
  --bg-elev: #0F1A2D;
  --surface: rgba(20,33,58,.55);
  --surface-hi: rgba(30,50,84,.7);
  --border: rgba(55,177,218,.18);
  --border-hi: rgba(55,177,218,.45);
  --cyan: #37B1DA;
  --cyan-hi: #5DCDF5;
  --cyan-glow: rgba(55,177,218,.35);
  --lime: #B6D752;
  --lime-glow: rgba(182,215,82,.35);
  --navy: #1E324A;
  --tx: #E8F1FB;
  --tx-mu: #8BA3BF;
  --tx-dim: #5A7290;
  --ft: 'Space Grotesk', system-ui, sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --tr: .25s cubic-bezier(.4,0,.2,1);

  font-family: var(--ft);
  color: var(--tx);
  background: linear-gradient(180deg, #050912 0%, #0A1220 100%);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 40px rgba(55,177,218,.08);
  border: 1px solid var(--border);
  position: relative;
  height: 800px;
  display: flex;
  flex-direction: column;
  width: 100%;
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
}
#pde-painel *,
#pde-painel *::before,
#pde-painel *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
#pde-painel::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(55,177,218,.12) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 80%, rgba(182,215,82,.08) 0%, transparent 50%);
  z-index: 0;
}
#pde-painel::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: .25;
  background-image:
    linear-gradient(rgba(55,177,218,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(55,177,218,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
  z-index: 0;
}

@keyframes pde-spin { to { transform: rotate(360deg); } }
@keyframes pde-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes pde-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

#pde-painel .pde-header {
  padding: 16px 22px 14px;
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(15,26,45,.7) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 2;
}
#pde-painel .pde-h-row { display: flex; align-items: center; gap: 14px; }
#pde-painel .pde-logo-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
#pde-painel .pde-logo-wrap::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--cyan), var(--lime), var(--cyan));
  opacity: .6;
  animation: pde-spin 8s linear infinite;
}
#pde-painel .pde-logo-img {
  position: relative;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #fff;
  z-index: 1;
  display: block;
}
#pde-painel .pde-h-text { flex: 1; min-width: 0; }
#pde-painel .pde-h-title {
  font-size: 19px;
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -.02em;
}
#pde-painel .pde-h-tag {
  font-family: var(--fm);
  color: var(--lime);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .25em;
  text-transform: uppercase;
  margin-top: 4px;
}
#pde-painel .pde-stats { display: flex; gap: 8px; flex-shrink: 0; }
#pde-painel .pde-stat {
  font-family: var(--fm);
  font-size: 10px;
  color: var(--tx-mu);
  padding: 5px 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
}
#pde-painel .pde-stat b { color: var(--cyan); font-weight: 600; }

#pde-painel .pde-toolbar {
  flex-shrink: 0;
  padding: 12px 22px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,18,32,.5);
  position: relative;
  z-index: 2;
}
#pde-painel .pde-tb-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
#pde-painel .pde-search { flex: 1; position: relative; }
#pde-painel .pde-search input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--tx);
  font-family: var(--ft);
  font-size: 13px;
  outline: none;
  transition: var(--tr);
}
#pde-painel .pde-search input::placeholder { color: var(--tx-dim); }
#pde-painel .pde-search input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px var(--cyan-glow);
  background: var(--surface-hi);
}
#pde-painel .pde-search svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--cyan);
  pointer-events: none;
}
#pde-painel .pde-tb-btn {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--tx-mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--tr);
}
#pde-painel .pde-tb-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
}
#pde-painel .pde-tb-btn svg { width: 16px; height: 16px; }

#pde-painel .pde-cats {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: thin;
  scrollbar-color: var(--cyan) transparent;
}
#pde-painel .pde-cats::-webkit-scrollbar { height: 4px; }
#pde-painel .pde-cats::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
#pde-painel .pde-cats::-webkit-scrollbar-track { background: transparent; }

#pde-painel .pde-cat-chip {
  padding: 7px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--tx-mu);
  font-family: var(--ft);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: var(--tr);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
#pde-painel .pde-cat-chip:hover {
  border-color: var(--cyan);
  color: var(--cyan-hi);
  background: var(--surface-hi);
}
#pde-painel .pde-cat-chip.on {
  background: linear-gradient(135deg, rgba(55,177,218,.2), rgba(182,215,82,.15));
  border-color: var(--cyan);
  color: #fff;
  box-shadow: 0 0 12px var(--cyan-glow);
}
#pde-painel .pde-cat-chip .pde-cnt {
  font-family: var(--fm);
  font-size: 9px;
  color: var(--tx-dim);
  padding: 2px 6px;
  background: rgba(55,177,218,.1);
  border-radius: 99px;
}
#pde-painel .pde-cat-chip.on .pde-cnt { background: rgba(255,255,255,.15); color: #fff; }

#pde-painel .pde-gb {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px;
  scrollbar-width: thin;
  scrollbar-color: var(--cyan) transparent;
  position: relative;
  z-index: 1;
}
#pde-painel .pde-gb::-webkit-scrollbar { width: 6px; }
#pde-painel .pde-gb::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 3px; }

#pde-painel .pde-gm {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
#pde-painel .pde-gm-cnt { font-family: var(--fm); font-size: 11px; color: var(--tx-mu); }
#pde-painel .pde-gm-cnt b { color: var(--cyan); }
#pde-painel .pde-gm-page {
  font-family: var(--fm);
  font-size: 10px;
  color: var(--tx-dim);
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
}

#pde-painel .pde-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  grid-auto-rows: 130px;
  grid-auto-flow: dense;
  gap: 14px;
}

#pde-painel .pde-card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: var(--tr);
  animation: pde-fade .4s ease both;
  grid-row: span 2;
}
#pde-painel .pde-card.ori-portrait { grid-row: span 2; }
#pde-painel .pde-card.ori-landscape { grid-row: span 1; }
#pde-painel .pde-card.ori-square { grid-row: span 2; }
#pde-painel .pde-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent 50%, var(--lime));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: var(--tr);
  pointer-events: none;
}
#pde-painel .pde-card:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--cyan);
  box-shadow: 0 16px 32px rgba(0,0,0,.4), 0 0 24px var(--cyan-glow);
}
#pde-painel .pde-card:hover::before { opacity: 1; }

#pde-painel .pde-card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: var(--tr);
  -webkit-user-drag: none;
  pointer-events: none;
}
#pde-painel .pde-card:hover .pde-card-img { transform: scale(1.06); }

#pde-painel .pde-card-skel {
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg,
    rgba(30,50,84,.4) 30%,
    rgba(55,177,218,.1) 50%,
    rgba(30,50,84,.4) 70%);
  background-size: 200% 100%;
  animation: pde-shimmer 1.5s infinite;
}

#pde-painel .pde-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(5,9,18,.95) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 12px;
  opacity: 0;
  transition: var(--tr);
  pointer-events: none;
}
#pde-painel .pde-card:hover .pde-card-overlay { opacity: 1; }
#pde-painel .pde-card-name {
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
#pde-painel .pde-card-cat {
  font-family: var(--fm);
  font-size: 9px;
  color: var(--lime);
  text-transform: uppercase;
  letter-spacing: .15em;
  margin-top: 3px;
}
#pde-painel .pde-card-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--lime));
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(.8);
  transition: var(--tr);
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
#pde-painel .pde-card:hover .pde-card-badge { opacity: 1; transform: scale(1); }
#pde-painel .pde-card-badge svg { width: 14px; height: 14px; color: var(--navy); }

#pde-painel .pde-pag {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 20px 0 8px;
  flex-wrap: wrap;
}
#pde-painel .pde-pb {
  min-width: 32px;
  height: 32px;
  padding: 0 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--tx-mu);
  cursor: pointer;
  font-family: var(--fm);
  font-size: 11px;
  font-weight: 600;
  transition: var(--tr);
  display: flex;
  align-items: center;
  justify-content: center;
}
#pde-painel .pde-pb:hover:not(:disabled) {
  border-color: var(--cyan);
  color: var(--cyan);
}
#pde-painel .pde-pb.on {
  background: var(--cyan);
  border-color: var(--cyan);
  color: #fff;
}
#pde-painel .pde-pb:disabled { opacity: .3; cursor: not-allowed; }

#pde-painel .pde-state {
  max-width: 480px;
  margin: 32px auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
}
#pde-painel .pde-state-icon {
  width: 54px;
  height: 54px;
  margin: 0 auto 14px;
  background: linear-gradient(135deg, var(--cyan), var(--lime));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 24px var(--cyan-glow);
}
#pde-painel .pde-state-icon svg { width: 28px; height: 28px; color: var(--navy); }
#pde-painel .pde-state-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
#pde-painel .pde-state-desc { color: var(--tx-mu); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
#pde-painel .pde-state-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--tx);
  font-family: var(--fm);
  font-size: 12px;
  outline: none;
  margin-bottom: 10px;
  text-align: center;
}
#pde-painel .pde-state-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px var(--cyan-glow);
}
#pde-painel .pde-state-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--cyan), var(--cyan-hi));
  color: var(--navy);
  border: none;
  border-radius: 10px;
  font-family: var(--ft);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--tr);
  box-shadow: 0 4px 16px var(--cyan-glow);
}
#pde-painel .pde-state-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px var(--cyan-glow);
}

#pde-painel .pde-empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--tx-mu);
  grid-column: 1 / -1;
}
#pde-painel .pde-empty-ico { font-size: 40px; margin-bottom: 12px; opacity: .5; }

    if (e.key === '+' || e.key === '=') { e.preventDefault(); pdeZoomIn(); }
    if (e.key === '-' || e.key === '_') { e.preventDefault(); pdeZoomOut(); }
    if (e.key === '0') { e.preventDefault(); pdeResetZoom(); }
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); pdeToggleFullscreen(); }
  }
});

const stored = localStorage.getItem('pe_bv_key');
if (stored) API_KEY = stored;

document.getElementById('pde-srch').addEventListener('input', () => {
  clearTimeout(searchTimer);

});

pdeLoadDrive();

async function pdeLoadDrive() {
  pdeSetGcnt('Conectando ao Google Drive...');
  document.getElementById('pde-grid').innerHTML = pdeMkLoading('Carregando acervo...');
  document.getElementById('pde-pag').innerHTML = '';
  document.getElementById('pde-cats').innerHTML = '';

  const cached = pdeGetCache();
  if (cached) {
    allFolders = cached.folders;
    allImages = cached.images;
    pdeRenderCategories();
    pdeApplyFilters();
    pdeSetStats();
    pdeRefreshInBackground();
    return;
  }

  try {
    await pdeFetchFromDrive();
    pdeSaveCache();
    pdeRenderCategories();
    pdeApplyFilters();
    pdeSetStats();
    const cnt = allImages.length;
    pdeToast('✓ ' + cnt + ' imagem' + (cnt!==1?'ns':'') + ' carregada' + (cnt!==1?'s':''));
  } catch (err) {
    pdeHandleDriveError(err);
  }
}

async function pdeRefreshInBackground() {
  try {
    await pdeFetchFromDrive();
    pdeSaveCache();
    pdeRenderCategories();
    pdeApplyFilters();
    pdeSetStats();
  } catch (err) {
    console.warn('Refresh em background falhou:', err);
  }
}

async function pdeFetchFromDrive() {
  const folders = await pdeListFolders(ROOT_FOLDER_ID);
  const folderResults = await Promise.all(
    folders.map(async folder => {
      const images = await pdeListImages(folder.id);
      return {
        ...folder,
        count: images.length,
        images: images.map(img => ({
          id: img.id,
          name: pdeCleanName(img.name),
          rawName: img.name,
          folder: folder.name,
          folderId: folder.id,
          thumb: img.thumbnailLink || ('https://lh3.googleusercontent.com/d/' + img.id + '=s400')
        }))
      };
    })
  );

  allFolders = folderResults.map(f => ({
    id: f.id,
    name: pdeCleanFolderName(f.name),
    rawName: f.name,
    count: f.count
  })).sort((a,b) => a.rawName.localeCompare(b.rawName));

  allImages = folderResults.flatMap(f => f.images);
}

async function pdeListFolders(parentId) {
  let all = [], token = '';
  do {
    const p = new URLSearchParams({
      key: API_KEY,
      q: "'" + parentId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false",
      fields: 'nextPageToken,files(id,name)',
      pageSize: 1000,
      orderBy: 'name'
    });
    if (token) p.set('pageToken', token);
    const r = await fetch('https://www.googleapis.com/drive/v3/files?' + p);
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error((e.error && e.error.message) || 'HTTP ' + r.status);
    }
    const d = await r.json();
    all = all.concat(d.files || []);
    token = d.nextPageToken || '';
  } while (token);
  return all;
}

async function pdeListImages(folderId) {
  let all = [], token = '';
  const mimeQuery = IMG_TYPES.map(t => "mimeType='" + t + "'").join(' or ');
  do {
    const p = new URLSearchParams({
      key: API_KEY,
      q: "'" + folderId + "' in parents and (" + mimeQuery + ") and trashed=false",
      fields: 'nextPageToken,files(id,name,mimeType,thumbnailLink)',
      pageSize: 1000,
      orderBy: 'name'
    });
    if (token) p.set('pageToken', token);
    const r = await fetch('https://www.googleapis.com/drive/v3/files?' + p);
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error((e.error && e.error.message) || 'HTTP ' + r.status);
    }
    const d = await r.json();
    all = all.concat(d.files || []);
    token = d.nextPageToken || '';
  } while (token);
  return all;
}

window.pdeReloadDrive = function() {
  document.getElementById('pde-srch').value = '';
  activeCategory = 'all';
  localStorage.removeItem(CACHE_KEY);
  pdeLoadDrive();
};

function pdeGetCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.ts > CACHE_TTL) return null;
    return data;
  } catch { return null; }
}

function pdeSaveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      folders: allFolders,
      images: allImages
    }));
  } catch (e) {
    console.warn('Cache cheio:', e);
  }
}

function pdeRenderCategories() {
  const c = document.getElementById('pde-cats');
  c.innerHTML = '';
  c.appendChild(pdeMkChip('all', 'Todas', allImages.length, activeCategory === 'all'));
  allFolders.forEach(f => {
    c.appendChild(pdeMkChip(f.id, f.name, f.count, activeCategory === f.id));
  });
}

function pdeMkChip(id, name, count, active) {
  const btn = document.createElement('button');
  btn.className = 'pde-cat-chip' + (active ? ' on' : '');
  btn.innerHTML = '<span>' + pdeEscapeHtml(name) + '</span><span class="pde-cnt">' + count + '</span>';
  btn.onclick = () => {
    activeCategory = id;
    currentPage = 1;
    pdeRenderCategories();
    pdeApplyFilters();
    document.querySelector('.pde-gb').scrollTop = 0;
  };
  return btn;
}

function pdeApplyFilters() {
  const q = document.getElementById('pde-srch').value.trim().toLowerCase();
  filteredImages = allImages.filter(img => {
    if (activeCategory !== 'all' && img.folderId !== activeCategory) return false;
    if (q && !img.name.toLowerCase().includes(q) && !img.folder.toLowerCase().includes(q)) return false;
    return true;
  });
  pdeRenderGrid();
}

function pdeRenderGrid() {
  totalPages = Math.max(1, Math.ceil(filteredImages.length / PAGE_SIZE));
  currentPage = Math.max(1, Math.min(currentPage, totalPages));
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredImages.slice(start, start + PAGE_SIZE);

  const grid = document.getElementById('pde-grid');
  grid.innerHTML = '';

  pdeSetGcnt('<b>' + filteredImages.length + '</b> ' + (filteredImages.length === 1 ? 'imagem' : 'imagens') +
    (filteredImages.length !== allImages.length ? ' (de ' + allImages.length + ')' : ''));
  document.getElementById('pde-gpage').textContent = totalPages > 1 ? 'Página ' + currentPage + ' / ' + totalPages : '';

  if (!slice.length) {
    grid.innerHTML = '<div class="pde-empty"><div class="pde-empty-ico">∅</div><div class="pde-empty-tx">Nenhuma imagem encontrada</div></div>';
    document.getElementById('pde-pag').innerHTML = '';
    return;
  }

  slice.forEach((img, idx) => {
    const realIdx = start + idx;
    const card = document.createElement('div');
    card.className = 'pde-card';
    card.innerHTML =
      '<div class="pde-card-skel"></div>' +
      '<img class="pde-card-img" alt="" loading="lazy">' +
      '<div class="pde-card-overlay">' +
        '<div class="pde-card-name">' + pdeEscapeHtml(img.name) + '</div>' +
        '<div class="pde-card-cat">' + pdeEscapeHtml(img.folder) + '</div>' +
      '</div>' +
      '<div class="pde-card-badge">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg>' +
      '</div>';

    const imgEl = card.querySelector('.pde-card-img');
    const skel = card.querySelector('.pde-card-skel');
    imgEl.onload = () => {
      const w = imgEl.naturalWidth, h = imgEl.naturalHeight;
      const ratio = w / h;
      let ori;
      if (ratio > 1.2) ori = 'landscape';
      else if (ratio < 0.85) ori = 'portrait';
      else ori = 'square';
      card.classList.add('ori-' + ori);
      skel.remove();
    };
    imgEl.onerror = () => {
      skel.style.background = 'rgba(30,50,84,.5)';
      skel.style.animation = 'none';
      skel.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--tx-dim);font-size:10px;text-align:center;padding:8px;">Imagem indisponível</div>';
    };
    imgEl.src = img.thumb;

    card.onclick = () => pdeOpenLb(realIdx);
    grid.appendChild(card);
  });

  pdeRenderPagination();
}

function pdeRenderPagination() {
  const pag = document.getElementById('pde-pag');
  pag.innerHTML = '';
  if (totalPages <= 1) return;

  const mkPB = (label, page, opts) => {
    opts = opts || {};
    const b = document.createElement('button');
    b.className = 'pde-pb' + (opts.active ? ' on' : '');
    b.textContent = label;
    if (opts.disabled) b.disabled = true;
    else b.onclick = () => {
      currentPage = page;
      pdeRenderGrid();
      document.querySelector('.pde-gb').scrollTop = 0;
    };
    return b;
  };

  pag.appendChild(mkPB('‹', currentPage - 1, { disabled: currentPage === 1 }));

  const range = [];
  const win = 2;
  for (let i = Math.max(1, currentPage - win); i <= Math.min(totalPages, currentPage + win); i++) {
    range.push(i);
  }
  if (range[0] > 1) {
    pag.appendChild(mkPB('1', 1));
    if (range[0] > 2) {
      const dots = document.createElement('span');
      dots.className = 'pde-pb';
      dots.textContent = '...';
      dots.style.opacity = '.4';
      dots.style.cursor = 'default';
      pag.appendChild(dots);
    }
  }
  range.forEach(p => pag.appendChild(mkPB(String(p), p, { active: p === currentPage })));
  if (range[range.length - 1] < totalPages) {
    if (range[range.length - 1] < totalPages - 1) {
      const dots = document.createElement('span');
      dots.className = 'pde-pb';
      dots.textContent = '...';
      dots.style.opacity = '.4';
      dots.style.cursor = 'default';
      pag.appendChild(dots);
    }
    pag.appendChild(mkPB(String(totalPages), totalPages));
  }

  pag.appendChild(mkPB('›', currentPage + 1, { disabled: currentPage === totalPages }));
}

const ZOOM_MIN = 1;
const ZOOM_MAX = 4;
const ZOOM_STEP = 0.25;
const ZOOM_HIRES_THRESHOLD = 1.5;

let zoomLevel = 1, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let baseImgW = 0, baseImgH = 0;
let currentImg = null, currentHiResImg = null, hiResLoaded = false;

const inIframe = window.self !== window.top;

// Detectar modo: galeria normal ou iframe-filho-lightbox
const urlParams = new URLSearchParams(window.location.search);
const isLightboxFrame = urlParams.has('lightbox');

// Listener para receber comandos do pai (Webnode)
window.addEventListener('message', function(ev) {
  const d = ev.data;
  if (!d || typeof d !== 'object') return;

  // Comandos recebidos pelo iframe-lightbox (quando isLightboxFrame=true)
  if (isLightboxFrame) {
    if (d.tipo === 'pde-lb-init') {
      // Pai mandou os dados da galeria, abrir a imagem inicial
      filteredImages = d.images || [];
      lightboxIndex = d.index || 0;
      hiResLoaded = false;
      currentHiResImg = null;
      pdeResetZoomState();
      document.getElementById('pde-lb').classList.add('on');
      pdeRenderLb();
    }
    if (d.tipo === 'pde-lb-nav') {
      pdeNavLbInternal(d.dir);
    }
    if (d.tipo === 'pde-lb-close') {
      pdeCloseLbInternal();
    }
  }
});

// Avisar o pai que o iframe-lightbox carregou (pronto pra receber dados)
if (isLightboxFrame) {
  // Modo lightbox: viewport todo, esconder galeria
  document.body.classList.add('pde-lb-mode');

  // O lightbox está dentro de #pde-painel que está oculto.
  // Precisamos mover ele pra fora, direto no body, pra ficar visível.
  const lb = document.getElementById('pde-lb');
  if (lb) {
    document.body.appendChild(lb);
    // Reaplica estilos via classe especial
    lb.classList.add('pde-lb-standalone');
  }

  // Avisar pai que estamos prontos pra receber dados
  function announceReady() {
    try { window.parent.postMessage({ tipo: 'pde-lb-ready' }, '*'); } catch(e) {}
  }
  if (document.readyState === 'complete') {
    setTimeout(announceReady, 30);
  } else {
    window.addEventListener('load', () => setTimeout(announceReady, 30));
  }
}

window.pdeOpenLb = function(idx) {
  // Se estamos na galeria dentro de iframe (não no lightbox-frame), pedir pro pai abrir
  if (inIframe && !isLightboxFrame) {
    try {
      window.parent.postMessage({
        tipo: 'pde-lb-open',
        index: idx,
        images: filteredImages
      }, '*');
    } catch(e) {
      console.warn('Erro postMessage:', e);
      // Fallback: abrir lightbox interno
      pdeOpenLbInternal(idx);
    }
    return;
  }
  pdeOpenLbInternal(idx);
};

function pdeOpenLbInternal(idx) {
  lightboxIndex = idx;
  hiResLoaded = false;
  currentHiResImg = null;
  pdeResetZoomState();
  document.getElementById('pde-lb').classList.add('on');
  pdeRenderLb();
}

window.pdeCloseLb = function() {
  // Se somos o iframe-lightbox, pedir pro pai fechar o overlay
  if (isLightboxFrame) {
    try { window.parent.postMessage({ tipo: 'pde-lb-closed' }, '*'); } catch(e) {}
    return;
  }
  pdeCloseLbInternal();
};

function pdeCloseLbInternal() {
  if (document.fullscreenElement) document.exitFullscreen();
  document.getElementById('pde-lb').classList.remove('on', 'fs');
  lightboxIndex = -1;
  currentImg = null;
  currentHiResImg = null;
}

window.pdeNavLb = function(dir) {
  pdeNavLbInternal(dir);
};

function pdeNavLbInternal(dir) {
  const next = lightboxIndex + dir;
  if (next < 0 || next >= filteredImages.length) return;
  lightboxIndex = next;
  hiResLoaded = false;
  currentHiResImg = null;
  pdeResetZoomState();
  pdeRenderLb();
}

function pdeResetZoomState() {
  zoomLevel = 1;
  panX = 0;
  panY = 0;
  pdeUpdateZoomDisplay();
  pdeUpdateNavButtons();
}

function pdeRenderLb() {
  const img = filteredImages[lightboxIndex];
  if (!img) return;
  document.getElementById('pde-lb-name').textContent = img.name;
  document.getElementById('pde-lb-cat').textContent = img.folder;
  document.getElementById('pde-lb-loading').style.display = 'flex';
  document.getElementById('pde-lb-load-tx').textContent = 'Carregando imagem em alta...';

  const wrap = document.getElementById('pde-lb-wrap');
  wrap.classList.add('no-trans');
  pdeApplyTransform();
  setTimeout(() => wrap.classList.remove('no-trans'), 50);

  const baseUrl = 'https://lh3.googleusercontent.com/d/' + img.id + '=s2000';
  const imgEl = new Image();
  imgEl.crossOrigin = 'anonymous';
  imgEl.onload = () => {
    currentImg = imgEl;
    requestAnimationFrame(() => {
      pdeDrawImageOnCanvas(imgEl, false);
      document.getElementById('pde-lb-loading').style.display = 'none';
      pdeUpdateNavButtons();
    });
  };
  imgEl.onerror = () => {
    const fallback = new Image();
    fallback.onload = () => {
      currentImg = fallback;
      pdeDrawImageOnCanvas(fallback, true);
      document.getElementById('pde-lb-loading').style.display = 'none';
    };
    fallback.onerror = () => {
      const canvas = document.getElementById('pde-lb-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 800; canvas.height = 600;
      ctx.fillStyle = '#0F1A2D'; ctx.fillRect(0, 0, 800, 600);
      ctx.fillStyle = '#8BA3BF';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Não foi possível carregar a imagem', 400, 300);
      document.getElementById('pde-lb-loading').style.display = 'none';
    };
    fallback.src = baseUrl;
  };
  imgEl.src = baseUrl;
}

function pdeDrawImageOnCanvas(imgEl, skipWatermark) {
  const canvas = document.getElementById('pde-lb-canvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('pde-lb-stage');
  const stageRect = stage.getBoundingClientRect();
  const stageW = Math.max(stageRect.width, 320);
  const stageH = Math.max(stageRect.height, 240);
  const PAD_X = 24, PAD_Y = 40;
  const availW = stageW - PAD_X * 2;
  const availH = stageH - PAD_Y * 2;

  let w = imgEl.naturalWidth || imgEl.width;
  let h = imgEl.naturalHeight || imgEl.height;
  const ratio = Math.min(availW / w, availH / h, 1);
  w = Math.floor(w * ratio);
  h = Math.floor(h * ratio);

  canvas.width = w;
  canvas.height = h;
  baseImgW = w;
  baseImgH = h;

  ctx.clearRect(0, 0, w, h);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(imgEl, 0, 0, w, h);
  if (!skipWatermark) pdeDrawWatermark(ctx, w, h);

  const wrap = document.getElementById('pde-lb-wrap');
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  wrap.style.marginLeft = -w/2 + 'px';
  wrap.style.marginTop = -h/2 + 'px';
  pdeApplyTransform();
}

async function pdeLoadHiResIfNeeded() {
  if (hiResLoaded || zoomLevel < ZOOM_HIRES_THRESHOLD) return;
  const img = filteredImages[lightboxIndex];
  if (!img) return;
  hiResLoaded = true;
  document.getElementById('pde-lb-load-tx').textContent = 'Carregando alta resolução...';
  document.getElementById('pde-lb-loading').style.display = 'flex';

  const hiResUrl = 'https://lh3.googleusercontent.com/d/' + img.id + '=s4000';
  const hiImg = new Image();
  hiImg.crossOrigin = 'anonymous';
  hiImg.onload = () => {
    currentHiResImg = hiImg;
    pdeDrawImageOnCanvas(hiImg, false);
    document.getElementById('pde-lb-loading').style.display = 'none';
    pdeToast('✓ Alta resolução carregada');
  };
  hiImg.onerror = () => {
    document.getElementById('pde-lb-loading').style.display = 'none';
  };
  hiImg.src = hiResUrl;
}

function pdeDrawWatermark(ctx, w, h) {
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(-Math.PI / 6);
  ctx.font = 'bold ' + Math.max(28, w * 0.04) + "px 'Space Grotesk', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillText('PORTAL DO EDUCADOR', 0, 0);
  ctx.font = Math.max(14, w * 0.018) + "px 'JetBrains Mono', monospace";
  ctx.fillText('portaldoeducador.com.br', 0, Math.max(30, w * 0.035));
  ctx.restore();

  ctx.save();
  const padding = Math.max(16, w * 0.02);
  const fontSize = Math.max(12, w * 0.014);
  ctx.font = 'bold ' + fontSize + "px 'Space Grotesk', sans-serif";
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(182,215,82,0.7)';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.fillText('Portal do Educador', w - padding, h - padding);
  ctx.restore();
}

window.pdeZoomIn = function() { pdeSetZoom(zoomLevel + ZOOM_STEP); };
window.pdeZoomOut = function() { pdeSetZoom(zoomLevel - ZOOM_STEP); };
window.pdeResetZoom = function() {
  zoomLevel = 1; panX = 0; panY = 0;
  pdeApplyTransform();
  pdeUpdateZoomDisplay();
};

function pdeSetZoom(newLevel, cx, cy) {
  const oldLevel = zoomLevel;
  newLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newLevel));
  if (newLevel === oldLevel) return;
  if (cx != null && cy != null) {
    const stage = document.getElementById('pde-lb-stage');
    const rect = stage.getBoundingClientRect();
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const offsetX = cx - centerX;
    const offsetY = cy - centerY;
    const scaleDiff = newLevel / oldLevel;
    panX = offsetX - (offsetX - panX) * scaleDiff;
    panY = offsetY - (offsetY - panY) * scaleDiff;
  }
  zoomLevel = newLevel;
  pdeClampPan();
  pdeApplyTransform();
  pdeUpdateZoomDisplay();
  pdeLoadHiResIfNeeded();
}

function pdeClampPan() {
  if (zoomLevel <= 1) { panX = 0; panY = 0; return; }
  const stage = document.getElementById('pde-lb-stage');
  const stageW = stage.clientWidth, stageH = stage.clientHeight;
  const imgW = baseImgW * zoomLevel, imgH = baseImgH * zoomLevel;
  const maxPanX = Math.max(0, (imgW - stageW) / 2);
  const maxPanY = Math.max(0, (imgH - stageH) / 2);
  panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
  panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
}

function pdeApplyTransform() {
  const wrap = document.getElementById('pde-lb-wrap');
  wrap.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoomLevel + ')';
  const stage = document.getElementById('pde-lb-stage');
  if (zoomLevel > 1) stage.classList.add('zoomed');
  else stage.classList.remove('zoomed');
}

function pdeUpdateZoomDisplay() {
  document.getElementById('pde-lb-zoom').textContent = Math.round(zoomLevel * 100) + '%';
  document.getElementById('pde-btn-zoom-out').disabled = zoomLevel <= ZOOM_MIN;
  document.getElementById('pde-btn-zoom-in').disabled = zoomLevel >= ZOOM_MAX;
}

function pdeUpdateNavButtons() {
  document.getElementById('pde-btn-prev').disabled = lightboxIndex <= 0;
  document.getElementById('pde-btn-next').disabled = lightboxIndex >= filteredImages.length - 1;
}

window.pdeToggleFullscreen = function() {
  const lb = document.getElementById('pde-lb');
  if (!document.fullscreenElement) {
    if (lb.requestFullscreen) lb.requestFullscreen();
    else if (lb.webkitRequestFullscreen) lb.webkitRequestFullscreen();
    lb.classList.add('fs');
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    lb.classList.remove('fs');
  }
};

document.addEventListener('fullscreenchange', () => {
  const lb = document.getElementById('pde-lb');
  if (!document.fullscreenElement) lb.classList.remove('fs');
  setTimeout(() => {
    if (currentImg && lb.classList.contains('on')) {
      pdeResetZoomState();
      pdeDrawImageOnCanvas(currentHiResImg || currentImg, false);
    }
  }, 100);
});

let resizeTimer = null;
window.addEventListener('resize', () => {
  const lb = document.getElementById('pde-lb');
  if (!lb.classList.contains('on') || !currentImg) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    pdeResetZoomState();
    pdeDrawImageOnCanvas(currentHiResImg || currentImg, false);
  }, 150);
});

window.addEventListener('orientationchange', () => {
  const lb = document.getElementById('pde-lb');
  if (!lb.classList.contains('on') || !currentImg) return;
  setTimeout(() => {
    pdeResetZoomState();
    pdeDrawImageOnCanvas(currentHiResImg || currentImg, false);
  }, 300);
});

const lbStage = document.getElementById('pde-lb-stage');

lbStage.addEventListener('wheel', e => {
  if (!document.getElementById('pde-lb').classList.contains('on')) return;
  e.preventDefault();
  const rect = lbStage.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  pdeSetZoom(zoomLevel + delta, cx, cy);
}, { passive: false });

lbStage.addEventListener('mousedown', e => {
  if (zoomLevel <= 1) return;
  if (e.target.closest('.pde-lb-nav,.pde-lb-tool,.pde-lb-top')) return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panOriginX = panX;
  panOriginY = panY;
  lbStage.classList.add('panning');
  document.getElementById('pde-lb-wrap').classList.add('no-trans');
});

document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panOriginX + (e.clientX - panStartX);
  panY = panOriginY + (e.clientY - panStartY);
  pdeClampPan();
  pdeApplyTransform();
});

document.addEventListener('mouseup', () => {
  if (!isPanning) return;
  isPanning = false;
  lbStage.classList.remove('panning');
  setTimeout(() => {
    document.getElementById('pde-lb-wrap').classList.remove('no-trans');
  }, 50);
});

lbStage.addEventListener('dblclick', e => {
  if (e.target.closest('.pde-lb-nav,.pde-lb-tool,.pde-lb-top')) return;
  if (zoomLevel > 1) pdeResetZoom();
  else {
    const rect = lbStage.getBoundingClientRect();
    pdeSetZoom(2, e.clientX - rect.left, e.clientY - rect.top);
  }
});

let touchStartDist = 0, touchStartZoom = 1, touchCenter = { x:0, y:0 };
let lastTouchX = 0, lastTouchY = 0, touchPanning = false;

lbStage.addEventListener('touchstart', e => {
  if (!document.getElementById('pde-lb').classList.contains('on')) return;
  if (e.target.closest('.pde-lb-nav,.pde-lb-tool,.pde-lb-top')) return;
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx + dy*dy);
    touchStartZoom = zoomLevel;
    const rect = lbStage.getBoundingClientRect();
    touchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
    };
  } else if (e.touches.length === 1 && zoomLevel > 1) {
    touchPanning = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    panOriginX = panX;
    panOriginY = panY;
  }
}, { passive: false });

lbStage.addEventListener('touchmove', e => {
  if (!document.getElementById('pde-lb').classList.contains('on')) return;
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    pdeSetZoom(touchStartZoom * (dist / touchStartDist), touchCenter.x, touchCenter.y);
  } else if (e.touches.length === 1 && touchPanning) {
    e.preventDefault();
    panX = panOriginX + (e.touches[0].clientX - lastTouchX);
    panY = panOriginY + (e.touches[0].clientY - lastTouchY);
    pdeClampPan();
    pdeApplyTransform();
  }
}, { passive: false });

lbStage.addEventListener('touchend', () => {
  touchPanning = false;
  touchStartDist = 0;
});

function pdeHandleDriveError(err) {
  const msg = err.message || '';
  console.error('Drive error:', err);
  if (msg.includes('403') || msg.toLowerCase().includes('allowlist')) {
    pdeShowKeyError();
  } else if (msg.includes('400') || msg.toLowerCase().includes('key')) {
    pdeShowConfig('Chave de API inválida. Verifique e tente novamente.');
  } else if (msg.includes('404')) {
    pdeShowConfig('Pasta raiz não encontrada. Verifique o ID e permissões.');
  } else {
    pdeShowConfig('Erro: ' + msg);
  }
}

function pdeShowKeyError() {
  document.getElementById('pde-grid').innerHTML =
    '<div class="pde-state">' +
      '<div class="pde-state-icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>' +
      '</div>' +
      '<div class="pde-state-title">Acesso bloqueado</div>' +
      '<div class="pde-state-desc">' +
        'A pasta precisa estar como <b>público com link</b> no Google Drive.<br>' +
        'Confira também se a chave de API está válida.' +
      '</div>' +
      '<button class="pde-state-btn" onclick="pdeShowConfig()">Configurar chave</button>' +
    '</div>';
  pdeSetGcnt('Erro de acesso');
}

window.pdeShowConfig = function(errMsg) {
  errMsg = errMsg || '';
  document.getElementById('pde-grid').innerHTML =
    '<div class="pde-state">' +
      '<div class="pde-state-icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2 9 14"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>' +
      '</div>' +
      '<div class="pde-state-title">Configurar acesso ao Drive</div>' +
      '<div class="pde-state-desc">' +
        (errMsg ? '<span style="color:#FF6B6B">' + pdeEscapeHtml(errMsg) + '</span><br><br>' : '') +
        'Cole sua chave da Google Drive API abaixo.' +
      '</div>' +
      '<input class="pde-state-input" id="pde-cfg-key" placeholder="AIzaSy..." value="' + pdeEscapeHtml(API_KEY) + '">' +
      '<button class="pde-state-btn" onclick="pdeSaveKey()">Salvar e recarregar</button>' +
    '</div>';
};

window.pdeSaveKey = function() {
  const v = document.getElementById('pde-cfg-key').value.trim();
  if (!v) { pdeToast('Chave vazia'); return; }
  API_KEY = v;
  localStorage.setItem('pe_bv_key', v);
  pdeLoadDrive();
};

function pdeSetGcnt(html) { document.getElementById('pde-gcnt').innerHTML = html; }

function pdeSetStats() {
  document.getElementById('pde-st-imgs').textContent = allImages.length;
  document.getElementById('pde-st-cats').textContent = allFolders.length;
}

function pdeMkLoading(txt) {
  return '<div class="pde-loading"><div class="pde-loading-spin"></div><div>' + pdeEscapeHtml(txt) + '</div></div>';
}

function pdeToast(msg) {
  const t = document.getElementById('pde-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(pdeToast._tmr);
  pdeToast._tmr = setTimeout(() => t.classList.remove('show'), 2400);
}

function pdeEscapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function pdeCleanName(name) {
  return name
    .replace(/\.(png|jpg|jpeg|webp)$/i, '')
    .replace(/[_-]+/g, ' ')
    .replace(/^\d+[\s._-]+/, '')
    .trim();
}

function pdeCleanFolderName(name) {
  return name.replace(/^\d+[-_\s]+/, '').replace(/[_-]+/g, ' ').trim();
}

})();
</script>
